<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loop | فضاءك البنفسجي</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط عربية حديثة -->
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <!-- Meta Tags for SEO -->
    <meta name="description" content="Loop - فضاءك البنفسجي للتواصل الاجتماعي، شارك اللحظات واستكشف الإبداع">
    <meta property="og:title" content="Loop">
    <meta property="og:description" content="تطبيق تواصل اجتماعي بمزايا عصرية وتصميم بنفسجي فاخر">
    <meta property="og:image" content="https://i.ibb.co/4ZxfSNqf/IMG-426.jpg">
    <meta property="og:url" content="https://your-domain.com">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        /* ===== متغيرات التصميم (الوضع الليلي فقط) ===== */
        :root {
            --bg-dark: #000000;
            --bg-deep: #050505;
            --bg-elevated: #121212;
            --bg-card: rgba(18, 18, 18, 0.7);
            --accent-lavender: #C7B9FF;
            --accent-soft-purple: #9F8BFF;
            --accent-deep-purple: #6B4EFF;
            --accent-glow: #8A6CFF;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #707070;
            --border-dim: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(159, 139, 255, 0.3);
            --shadow-intense: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.03);
            --shadow-soft: 0 15px 35px -10px rgba(106, 78, 255, 0.3);
            --shadow-card: 0 10px 30px -15px rgba(0, 0, 0, 0.5);
            --blur-xl: blur(30px);
            --blur-lg: blur(20px);
            --blur-card: blur(15px);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --nav-height: 70px;
            --card-radius: 24px;
            --button-radius: 28px;
            --space-1: 8px;
            --space-2: 16px;
            --space-3: 24px;
            --space-4: 32px;
            --space-5: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Readex Pro', 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-weight: 400;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            background: var(--bg-deep);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-intense);
            aspect-ratio: 9 / 16;
            max-width: none;
            max-height: none;
            margin: 0;
        }

        /* ===== الشاشات ===== */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-deep);
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
            z-index: 10;
            opacity: 1;
        }

        /* ===== تأثير التموج (Ripple) ===== */
        .ripple-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: inherit;
            pointer-events: none;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ===== نماذج الدخول الفاخرة ===== */
        .auth-container {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--space-3) var(--space-2);
            background: radial-gradient(circle at 50% 0%, #2A2355, var(--bg-deep) 70%);
            position: relative;
        }

        .auth-header {
            text-align: center;
            margin-bottom: var(--space-5);
        }

        .auth-header h1 {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-deep-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            line-height: 1.1;
            filter: drop-shadow(0 10px 20px rgba(106, 78, 255, 0.4));
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
            margin-top: var(--space-1);
        }

        .auth-app-image {
            width: 120px;
            height: 120px;
            margin: 0 auto var(--space-3);
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid var(--border-glow);
            box-shadow: var(--shadow-soft);
        }
        .auth-app-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-group-modern {
            margin-bottom: var(--space-2);
            position: relative;
        }

        .input-group-modern i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-soft-purple);
            font-size: 18px;
            transition: var(--transition-smooth);
            z-index: 2;
        }

        .input-group-modern input,
        .input-group-modern textarea {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border-dim);
            border-radius: var(--button-radius);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 400;
            outline: none;
            transition: var(--transition-smooth);
            backdrop-filter: var(--blur-lg);
        }

        .input-group-modern textarea {
            border-radius: var(--button-radius);
            resize: none;
        }

        .input-group-modern input:focus,
        .input-group-modern textarea:focus {
            border-color: var(--accent-soft-purple);
            background: rgba(159, 139, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(159, 139, 255, 0.2);
        }

        .btn-gradient {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-soft-purple), var(--accent-deep-purple));
            color: white;
            border: none;
            border-radius: var(--button-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 30px -5px var(--accent-deep-purple);
            border: 1px solid var(--border-glow);
            margin-top: 10px;
        }

        .btn-gradient:active {
            transform: scale(0.97);
            box-shadow: 0 5px 20px -2px var(--accent-glow);
        }

        .btn-gradient:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .auth-switch {
            margin-top: var(--space-3);
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-1);
        }

        .text-link {
            background: transparent;
            border: none;
            color: var(--accent-lavender);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            transition: var(--transition-smooth);
        }

        .text-link:active {
            background: rgba(199, 185, 255, 0.15);
        }

        /* ===== الشريط العلوي ===== */
        .home-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 60px;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: var(--blur-xl);
            border-bottom: 1px solid var(--border-dim);
            position: sticky;
            top: 0;
            z-index: 15;
        }
        .home-header-left {
            font-size: 24px;
            color: var(--accent-lavender);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition-smooth);
        }
        .home-header-left:active {
            background: rgba(199, 185, 255, 0.15);
        }
        .home-header-center {
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-deep-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }
        .home-header-right {
            font-size: 24px;
            color: var(--accent-lavender);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition-smooth);
        }
        .home-header-right:active {
            background: rgba(199, 185, 255, 0.15);
        }

        /* ===== قسم القصص ===== */
        .stories-container {
            padding: 12px 0;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-bottom: 1px solid var(--border-dim);
            background: transparent;
        }
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        .stories-scroll {
            display: inline-flex;
            gap: 16px;
            padding: 0 16px;
        }
        .story-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            width: 68px;
            flex-shrink: 0;
        }
        .story-avatar {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-deep-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-soft);
        }
        .story-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-deep);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-deep);
        }
        .story-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .story-avatar-inner i {
            font-size: 30px;
            color: var(--text-secondary);
        }
        .story-username {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            max-width: 68px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .story-add {
            background: rgba(159, 139, 255, 0.3);
            border: 2px dashed var(--accent-soft-purple);
        }
        .story-add .story-avatar-inner {
            background: transparent;
            border: none;
        }
        .story-add i {
            font-size: 30px;
            color: var(--accent-lavender);
        }

        /* ===== التبويب الرئيسي ===== */
        .main-tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: calc(var(--nav-height) + 10px);
            scrollbar-width: thin;
            scrollbar-color: var(--accent-soft-purple) var(--bg-elevated);
        }

        .main-tab-content.active {
            display: block;
        }

        /* الصفحة الرئيسية - بطاقات الفيديو */
        #home-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px 12px;
        }

        /* بطاقة المنشور */
        .post-card {
            background: var(--bg-card);
            backdrop-filter: var(--blur-card);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-dim);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
        }
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 2px solid var(--border-glow);
        }
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-name {
            font-weight: 700;
            font-size: 15px;
        }
        .post-username {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .post-options {
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
        }
        /* حاوية الفيديو مع التحكمات */
        .post-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }
        .post-media video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #000;
        }
        /* شريط التقدم */
        .video-progress-bar {
            position: absolute;
            bottom: 40px;
            left: 10px;
            right: 10px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .post-media:hover .video-progress-bar,
        .post-media.video-controls-visible .video-progress-bar {
            opacity: 1;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-lavender), var(--accent-deep-purple));
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }
        /* أزرار التحكم */
        .video-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 8px 12px;
            border-radius: 30px;
            backdrop-filter: var(--blur-lg);
        }
        .post-media:hover .video-controls,
        .post-media.video-controls-visible .video-controls {
            opacity: 1;
        }
        .video-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition-smooth);
            text-shadow: 0 2px 5px black;
        }
        .video-controls button:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.95);
        }
        .video-controls .time-display {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: white;
            text-shadow: 0 1px 3px black;
        }
        /* تفاعلات المنشور */
        .post-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 16px;
        }
        .post-action {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .post-action span {
            font-size: 14px;
            font-weight: 500;
        }
        .post-action.liked i {
            color: #ff4d6d;
            animation: likePop 0.2s ease;
        }
        .post-caption {
            padding: 0 16px 12px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
        }
        .post-caption strong {
            color: var(--accent-lavender);
            margin-left: 6px;
        }
        .post-caption a {
            color: var(--accent-soft-purple);
            text-decoration: none;
            font-weight: 600;
        }
        .post-comments-preview {
            padding: 0 16px 16px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .post-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 16px 16px;
        }
        @keyframes likePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Skeleton محسن */
        .skeleton-card {
            background: rgba(30, 30, 30, 0.5);
            backdrop-filter: var(--blur-card);
            border-radius: var(--card-radius);
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-dim);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .skeleton-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .skeleton-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: skeleton-pulse 1.5s infinite;
        }
        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            flex: 1;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-media {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin: 12px 0;
            animation: skeleton-pulse 1.5s infinite;
        }
        .skeleton-actions {
            display: flex;
            gap: 20px;
            margin: 12px 0;
        }
        .skeleton-action {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: skeleton-pulse 1.5s infinite;
        }

        /* رأس صفحة الرسائل */
        .messages-header {
            padding: var(--space-3) var(--space-2) var(--space-2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, var(--bg-deep) 70%, transparent);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .messages-header h2 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-soft-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .notification-bell {
            position: relative;
            font-size: 26px;
            color: var(--accent-lavender);
            cursor: pointer;
            padding: var(--space-1);
        }
        .notification-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff4d6d;
            color: white;
            font-size: 11px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--bg-deep);
        }

        /* البطاقات */
        .card-item {
            display: flex;
            align-items: center;
            padding: var(--space-2) var(--space-2);
            margin: var(--space-1) var(--space-2);
            background: var(--bg-elevated);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-dim);
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: var(--blur-lg);
            box-shadow: 0 5px 15px -8px rgba(0,0,0,0.5);
        }

        .card-item:active {
            transform: scale(0.98);
            border-color: var(--accent-soft-purple);
            background: #1A1A1A;
        }

        .avatar-modern {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            margin-left: 14px;
            border: 2px solid var(--border-glow);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(106, 78, 255, 0.4);
            flex-shrink: 0;
        }

        .avatar-modern img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            flex: 1;
        }

        .item-info h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .item-info p {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
            font-weight: 400;
        }

        .user-status {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .user-status.online {
            color: #4CAF50;
        }
        .user-status.online i {
            font-size: 8px;
        }

        .item-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-right: var(--space-1);
            white-space: nowrap;
        }

        .empty-state-modern {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-muted);
            text-align: center;
            padding: var(--space-3);
        }

        .empty-state-modern i {
            font-size: 80px;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-deep-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: var(--space-3);
            opacity: 0.5;
        }

        .empty-state-modern h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .header-modern {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: var(--blur-xl);
            border-bottom: 1px solid var(--border-dim);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-modern .back-btn {
            font-size: 26px;
            color: var(--accent-lavender);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition-smooth);
        }

        .header-modern .back-btn:active {
            background: rgba(199, 185, 255, 0.15);
        }

        .header-modern h2 {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(145deg, var(--accent-lavender), var(--accent-soft-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ===== الملف الشخصي ===== */
        .profile-header-modern {
            padding: var(--space-3) var(--space-2) 15px;
            background: linear-gradient(145deg, #1A1A1A, var(--bg-deep));
            border-bottom: 1px solid var(--border-dim);
            text-align: center;
            position: relative;
            border-radius: 0 0 var(--card-radius) var(--card-radius);
        }

        .profile-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 4px solid transparent;
            background: linear-gradient(var(--bg-elevated), var(--bg-elevated)) padding-box,
                        linear-gradient(145deg, var(--accent-lavender), var(--accent-deep-purple)) border-box;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px -5px var(--accent-deep-purple);
            cursor: pointer;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar-large i {
            font-size: 40px;
            color: var(--text-secondary);
        }

        .profile-name-large {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
            background: linear-gradient(145deg, var(--accent-lavender), white);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .profile-username-large {
            font-size: 14px;
            color: var(--accent-soft-purple);
            margin-bottom: 8px;
            cursor: pointer;
        }

        .profile-bio {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 0 20px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .profile-website {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .profile-website a {
            color: var(--accent-lavender);
            text-decoration: none;
            font-weight: 600;
        }

        .profile-verified {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: var(--space-3);
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: var(--blur-lg);
            border-radius: 50px;
            padding: var(--space-1) 20px;
            border: 1px solid var(--border-dim);
            width: fit-content;
            margin: 0 auto 12px;
        }

        .stat-item-row {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .stat-item-row i {
            font-size: 16px;
            color: var(--accent-lavender);
        }

        .stat-number-row {
            font-weight: 700;
            color: var(--text-primary);
            margin-left: 2px;
        }

        .btn-outline-modern {
            position: relative;
            overflow: hidden;
            background: transparent;
            border: 1.5px solid var(--accent-soft-purple);
            color: var(--accent-lavender);
            border-radius: var(--button-radius);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: var(--transition-smooth);
            backdrop-filter: var(--blur-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-1);
        }

        .btn-outline-modern:active {
            background: rgba(159, 139, 255, 0.2);
            border-color: var(--accent-lavender);
        }

        .menu-icon {
            position: absolute;
            top: var(--space-3);
            left: 15px;
            font-size: 26px;
            color: var(--accent-lavender);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: var(--transition-smooth);
        }

        .menu-icon:active {
            background: rgba(199, 185, 255, 0.15);
        }

        /* شبكة الفيديوهات في الملف الشخصي */
        .posts-grid-modern {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }

        .grid-post-modern {
            aspect-ratio: 1;
            background: var(--bg-elevated);
            border-radius: var(--card-radius);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-dim);
            cursor: pointer;
        }

        .grid-post-modern video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-post-overlay-modern {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: var(--blur-lg);
            border-radius: 30px;
            padding: 3px 8px;
            font-size: 11px;
            color: white;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* ===== المحادثة ===== */
        .chat-container-modern {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-deep);
        }

        .chat-header-modern {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-2) var(--space-2);
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: var(--blur-xl);
            border-bottom: 1px solid var(--border-dim);
            position: relative;
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--border-glow);
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-avatar i {
            font-size: 20px;
            color: white;
        }

        .chat-user-text {
            font-weight: 700;
            font-size: 16px;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-menu-icon {
            font-size: 24px;
            color: var(--accent-lavender);
            cursor: pointer;
            padding: var(--space-1);
            border-radius: 50%;
            transition: var(--transition-smooth);
        }

        .chat-menu-icon:active {
            background: rgba(199, 185, 255, 0.15);
        }

        .typing-indicator-bottom {
            padding: 5px 20px;
            font-size: 12px;
            color: var(--accent-lavender);
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
            min-height: 22px;
        }
        .typing-indicator-bottom.show {
            opacity: 1;
        }
        .typing-indicator-bottom i {
            font-size: 12px;
            animation: typingPulse 1s infinite;
        }
        @keyframes typingPulse {
            0% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-2px); }
            100% { opacity: 0.4; transform: translateY(0); }
        }

        .chat-messages-modern {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper-modern {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            position: relative;
        }

        .message-wrapper-modern.sent {
            align-self: flex-end;
        }

        .message-wrapper-modern.received {
            align-self: flex-start;
        }

        .message-bubble {
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.4;
            backdrop-filter: var(--blur-lg);
            border: 1px solid var(--border-dim);
            animation: popIn 0.15s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .message-bubble.sent {
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-bubble.received {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .message-time-modern {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: left;
        }

        /* قائمة التفاعلات المنبثقة */
        .message-actions-popup {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -120%);
            background: var(--bg-elevated);
            backdrop-filter: var(--blur-xl);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 6px;
            display: flex;
            gap: 6px;
            z-index: 30;
            box-shadow: var(--shadow-soft);
        }
        .message-actions-popup button {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            color: var(--accent-lavender);
        }
        .message-actions-popup button:active {
            background: var(--accent-deep-purple);
            transform: scale(1.1);
        }
        .message-actions-popup .delete-action {
            color: #ff4d6d;
        }

        .reactions-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 4px;
            align-items: center;
        }

        .reaction-badge {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: var(--blur-lg);
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid var(--border-dim);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .reaction-badge:active {
            background: var(--accent-deep-purple);
            transform: scale(1.02);
        }

        .reaction-count {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .reaction-picker-modern {
            display: inline-flex;
            gap: 3px;
            background: var(--bg-elevated);
            backdrop-filter: var(--blur-xl);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid var(--border-glow);
        }

        .reaction-picker-modern button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .reaction-picker-modern button:active {
            background: var(--accent-deep-purple);
            transform: scale(1.1);
        }

        .reaction-toggle-modern {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-dim);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent-lavender);
            transition: var(--transition-smooth);
        }

        .reaction-toggle-modern:active {
            background: var(--accent-deep-purple);
            color: white;
        }

        .chat-input-modern {
            display: flex;
            padding: 12px 16px 5px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: var(--blur-xl);
            border-top: 1px solid var(--border-dim);
            gap: var(--space-1);
            align-items: center;
        }

        .chat-input-modern input {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--button-radius);
            background: var(--bg-elevated);
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            font-size: 14px;
        }

        .chat-input-modern input:focus {
            outline: none;
            border-color: var(--accent-soft-purple);
        }

        .chat-input-modern button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input-modern button:active {
            transform: scale(0.9);
        }

        .attach-btn-modern {
            background: var(--bg-elevated);
            color: var(--accent-lavender);
            border: 1px solid var(--border-dim);
        }

        /* ===== ريلز سينمائي (تم إصلاحه) ===== */
        .reels-container-modern {
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: var(--bg-deep);
            scroll-behavior: smooth;
        }

        .reel-card-modern {
            position: relative;
            width: 100%;
            min-height: 100%;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-video-modern {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .reel-progress-modern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .reel-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-lavender), var(--accent-deep-purple));
            width: 0%;
            transition: width 0.1s linear;
        }

        .reel-overlay-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 70px;
            opacity: 0;
            transition: opacity 0.1s;
            text-shadow: 0 0 20px var(--accent-deep-purple);
            z-index: 6;
        }

        .reel-overlay-icon.show {
            opacity: 1;
            animation: fadeOut 0.5s forwards;
        }

        .reel-gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 50%, transparent 100%);
            pointer-events: none;
        }

        .reel-content-modern {
            position: absolute;
            bottom: 30px;
            right: 20px;
            left: 20px;
            z-index: 5;
        }

        .reel-user-row-modern {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .reel-user-info-modern {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .reel-avatar-modern {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--accent-lavender);
            overflow: hidden;
            background: var(--accent-deep-purple);
            position: relative;
        }

        .reel-avatar-modern img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-avatar-modern i {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .reel-follow-icon-modern {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: linear-gradient(145deg, var(--accent-soft-purple), var(--accent-deep-purple));
            border: 2px solid var(--bg-deep);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: var(--transition-smooth);
            z-index: 6;
        }

        .reel-follow-icon-modern.following {
            background: rgba(255,255,255,0.2);
            color: var(--accent-lavender);
        }

        .reel-follow-icon-modern.hidden {
            display: none;
        }

        .reel-follow-icon-modern:active {
            transform: scale(0.9);
        }

        .reel-user-text-modern {
            display: flex;
            flex-direction: column;
        }

        .reel-user-name-modern {
            font-weight: 700;
            font-size: 16px;
            color: white;
            text-shadow: 0 2px 8px black;
        }

        .reel-user-username-modern {
            font-size: 13px;
            color: var(--accent-lavender);
        }

        .reel-caption-modern {
            color: white;
            font-size: 15px;
            text-shadow: 0 2px 5px black;
            max-width: 80%;
            font-weight: 400;
        }

        .reel-actions-modern {
            position: absolute;
            left: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 5;
        }

        .reel-action-modern {
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-shadow: 0 2px 8px black;
            transition: var(--transition-smooth);
        }

        .reel-action-modern:active {
            transform: scale(0.9);
        }

        .reel-action-modern span {
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: var(--blur-lg);
            padding: 2px 8px;
            border-radius: 40px;
        }

        .reel-action-modern.liked i {
            color: #ff4d6d;
            animation: likePop 0.2s ease;
        }

        .reel-search-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: var(--blur-lg);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            z-index: 5;
            border: 1px solid var(--border-dim);
        }

        .reel-owner-actions-modern {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: var(--blur-xl);
            border-radius: 50px;
            padding: 6px 12px;
            display: flex;
            gap: 12px;
            z-index: 5;
        }

        .reel-owner-actions-modern button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .reels-loading-more {
            text-align: center;
            padding: 15px;
            color: var(--accent-lavender);
            font-size: 14px;
        }

        /* ===== القائمة السفلية (5 أيقونات) مع زر كرة القدم الجديد ===== */
        .bottom-nav-modern {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: var(--blur-xl);
            border-top: 1px solid var(--border-dim);
            height: var(--nav-height);
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 20;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .nav-item-modern {
            position: relative;
            overflow: hidden;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;  /* توزيع المساحة بالتساوي بين الأزرار الخمسة */
            padding: 6px 0;
        }

        .nav-item-modern span {
            font-size: 10px;
            font-weight: 400;
            opacity: 0;
            transform: translateY(5px);
            transition: var(--transition-smooth);
        }

        .nav-item-modern.active {
            color: var(--accent-lavender);
            transform: translateY(-3px);
        }

        .nav-item-modern.active span {
            opacity: 1;
            transform: translateY(0);
            font-weight: 600;
        }

            function timeAgo(date) {
                const now = new Date();
                const diff = Math.floor((now - new Date(date)) / 1000);
                if (diff < 60) return 'منذ لحظات';
                if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
                return `منذ ${Math.floor(diff / 86400)} يوم`;
            }

            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // ===== تحليل النص لهاشتاغ وإشارات =====
            function parseText(text) {
                if (!text) return '';
                return text.replace(/#(\w+)/g, '<a href="#" onclick="window.searchByHashtag(\'$1\'); return false;">#$1</a>')
                           .replace(/@(\w+)/g, '<a href="#" onclick="window.searchByUsername(\'$1\'); return false;">@$1</a>');
            }

            // ===== دوال المصادقة =====
            window.doSignUp = async function() {
                const n = document.getElementById('s-name').value.trim();
                const u = document.getElementById('s-user').value.trim();
                const e = document.getElementById('s-email').value.trim();
                const p = document.getElementById('s-pass').value;
                if (!n || !u || !e || !p) return alert("الرجاء ملء جميع الحقول");
                if (p.length < 6) return alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");

                const { data: existing } = await sb.from('profiles').select('username').eq('username', u).maybeSingle();
                if (existing) return alert("اسم المستخدم هذا غير متاح، اختر اسم آخر");

                const btn = document.getElementById('btn-s');
                btn.disabled = true; btn.innerText = 'جاري الإنشاء...';

                const { data, error } = await sb.auth.signUp({
                    email: e,
                    password: p,
                    options: { data: { full_name: n, username: u } }
                });

                if (error) {
                    alert(error.message);
                    btn.disabled = false; btn.innerText = 'إنشاء الحساب';
                    return;
                }

                if (data.user) {
                    const { error: profileError } = await sb.from('profiles').insert([
                        { id: data.user.id, username: u, full_name: n, avatar_url: null, bio: '', website: '', is_verified: false }
                    ]);
                    if (profileError) console.error('خطأ في إنشاء الملف الشخصي:', profileError);
                }

                btn.disabled = false; btn.innerText = 'إنشاء الحساب';
                currentUser = data.user;
                updateUI(currentUser);
                go('main-screen');
            };

                const btn = document.getElementById('btn-l');
                btn.disabled = true; btn.innerText = 'جاري الدخول...';

                const { data, error } = await sb.auth.signInWithPassword({ email: e, password: p });

            async function loadNotifications() {
                if (!currentUser) return;
                const loading = document.getElementById('notifications-loading');
                const empty = document.getElementById('notifications-empty');
                const listDiv = document.getElementById('notifications-list');
                loading.style.display = 'flex';
                empty.style.display = 'none';
                listDiv.innerHTML = '';
                listDiv.appendChild(loading);

                const { data, error } = await sb
                    .from('notifications')
                    .select(`*, from_user:from_user_id ( full_name, username, avatar_url )`)
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                loading.style.display = 'none';
                if (error || !data || data.length === 0) {
                    empty.style.display = 'flex';
                    return;
                }

                let html = '';
                data.forEach(notif => {
                    const user = notif.from_user;
                    let text = '';
                    if (notif.type === 'message_request') text = 'أرسل لك رسالة جديدة';
                    else if (notif.type === 'like') text = 'أعجب بريلك';
                    else if (notif.type === 'comment') text = 'علق على ريلك';
                    const time = new Date(notif.created_at).toLocaleString('ar-EG');
                    html += `
                        <div class="notification-item ${notif.is_read ? '' : 'unread'}" onclick="window.handleNotificationClick('${notif.type}', '${notif.from_user_id}', ${notif.reel_id || 'null'}, ${notif.comment_id || 'null'})">
                            <div class="notification-icon">${user?.avatar_url ? `<img src="${user.avatar_url}" style="width:100%; height:100%; object-fit:cover;">` : '<i class="fa-solid fa-user"></i>'}</div>

                                <p><strong>${user?.full_name || 'مستخدم'}</strong> ${text}</p>
                                <div class="notification-time">${time}</div>
                            </div>
                            ${!notif.is_read ? '<div class="notification-unread"></div>' : ''}
                        </div>
                    `;
                });
                listDiv.innerHTML = html;

            window.handleNotificationClick = function(type, fromUserId, reelId, commentId) {
                if (type === 'message_request' || type === 'like' || type === 'comment') {
                    sb.from('profiles').select('*').eq('id', fromUserId).single().then(({ data }) => {
                        if (data) {
                            openChat(data.id, data.full_name, data.username, data.avatar_url);
                        }
                    });

            };

            function subscribeToNotifications() {
                if (!currentUser) return;
                sb.channel('notifications-channel')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'notifications',
                        filter: `user_id=eq.${currentUser.id}`
                    }, () => {
                        loadUnreadNotificationsCount();
                        if (document.getElementById('notifications-screen').classList.contains('active')) {
                            loadNotifications();
                        }
                    })
                    .subscribe();

                if (userId === fromUserId) return;
                await sb.from('notifications').insert([{
                    user_id: userId,
                    type: type,
                    from_user_id: fromUserId,
