            // ===== دوال المحادثات =====
            async function loadConversations() {
                if (!currentUser) return;
                const container = document.getElementById('conversations-list');
                const loadingEl = document.getElementById('conversations-loading');
                const emptyEl = document.getElementById('conversations-empty');
                if (!container || !loadingEl || !emptyEl) return;

                loadingEl.style.display = 'flex';
                emptyEl.style.display = 'none';
                container.innerHTML = '';
                container.appendChild(loadingEl);

                const { data: messages, error } = await sb
                    .from('messages')
                    .select('*')
                    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error(error);
                    loadingEl.style.display = 'none';
                    emptyEl.style.display = 'flex';
                    return;
                }

                const conversations = new Map();
                messages.forEach(msg => {
                    const otherId = msg.sender_id === currentUser.id ? msg.receiver_id : msg.sender_id;
                    if (!conversations.has(otherId) || new Date(msg.created_at) > new Date(conversations.get(otherId).created_at)) {
                        conversations.set(otherId, msg);
                    }
                });

                if (conversations.size === 0) {
                    loadingEl.style.display = 'none';
                    emptyEl.style.display = 'flex';
                    return;
                }

                const userIds = Array.from(conversations.keys());
                const { data: profiles } = await sb
                    .from('profiles')
                    .select('*')
                    .in('id', userIds);

                const profileMap = {};
                if (profiles) profiles.forEach(p => profileMap[p.id] = p);

                let html = '';
                conversations.forEach((msg, userId) => {
                    const profile = profileMap[userId] || {};
                    const avatarHtml = profile.avatar_url ? `<img src="${profile.avatar_url}">` : '<i class="fa-solid fa-user"></i>';
                    const time = new Date(msg.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                    html += `
                        <div class="card-item" data-other-user-id="${userId}" data-other-user-name="${profile.full_name || 'مستخدم'}" data-other-user-username="${profile.username || 'user'}" data-other-user-avatar="${profile.avatar_url || ''}" onclick="window.openChatFromCard(event, '${userId}', '${profile.full_name || 'مستخدم'}', '${profile.username || 'user'}', '${profile.avatar_url || ''}')">
                            <div class="avatar-modern">${avatarHtml}</div>
                            <div class="item-info">
                                <h4>${profile.full_name || 'مستخدم'}</h4>
                                <p>${msg.content || '📷 وسائط'}</p>
                            </div>
                            <div class="item-meta">${time}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                loadingEl.style.display = 'none';

                document.querySelectorAll('.card-item[data-other-user-id]').forEach(card => {
                    card.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const otherUserId = card.dataset.otherUserId;
                        const otherUserName = card.dataset.otherUserName;
                        showConversationContextMenu(e, otherUserId, otherUserName);
                    });
                });
            }

            window.sendMessage = async function() {
                const input = document.getElementById('message-input');
                const content = input.value.trim();
                if (!content && !selectedFile) return;

                if (blockedUsers.has(currentChatUser.id)) {
                    alert('لا يمكنك إرسال رسائل لهذا المستخدم لأنه محظور.');
                    return;
                }

                let mediaUrl = null, mediaType = null;
                if (selectedFile) {
                    mediaUrl = await uploadChatFile(selectedFile);
                    mediaType = selectedFile.type.startsWith('image/') ? 'image' : 'video';
                    selectedFile = null;
                    document.getElementById('chat-file-input').value = '';
                }

                const messageData = { 
                    sender_id: currentUser.id, 
                    receiver_id: currentChatUser.id, 
                    content: content || '', 
                    created_at: new Date() 
                };
                if (mediaUrl) { 
                    messageData.media_url = mediaUrl; 
                    messageData.media_type = mediaType; 
                }

                const { data: prevMessages } = await sb
                    .from('messages')
                    .select('id')
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatUser.id}),and(sender_id.eq.${currentChatUser.id},receiver_id.eq.${currentUser.id})`)
                    .limit(1);
                
                const isFirstMessage = !prevMessages || prevMessages.length === 0;

                const { data, error } = await sb.from('messages').insert([messageData]).select();
                
                if (error) {
                    console.error(error);
                    alert('فشل إرسال الرسالة');
                    return;
                }

                if (data && data[0]) {
                    addMessageToChat(data[0], false);
                    if (isFirstMessage) {
                        createNotification(currentChatUser.id, 'message_request', currentUser.id);
                    }
                }

                input.value = '';
                loadConversations();
            };

            window.openChatFromCard = function(event, userId, fullName, username, avatarUrl) {
                if (event.type === 'click') {
                    openChat(userId, fullName, username, avatarUrl);
                }
            };

            window.openChat = function(userId, fullName, username, avatarUrl) {
                currentChatUser = { id: userId, fullName, username, avatarUrl };
                document.getElementById('chat-username').innerText = fullName;
                const chatAvatar = document.getElementById('chat-avatar');
                if (avatarUrl) chatAvatar.innerHTML = `<img src="${avatarUrl}" alt="avatar">`;
                else chatAvatar.innerHTML = '<i class="fa-solid fa-user"></i>';
                messageIdsSet.clear();
                loadMessages();
                go('chat-screen');
            };

            async function loadMessages() {
                if (!currentUser || !currentChatUser) return;
                const messagesDiv = document.getElementById('chat-messages');
                messagesDiv.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fa-solid fa-spinner fa-spin"></i></div>';

                const { data: messages, error } = await sb
                    .from('messages')
                    .select('*')
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${currentChatUser.id}),and(sender_id.eq.${currentChatUser.id},receiver_id.eq.${currentUser.id})`)
                    .order('created_at', { ascending: true });

                if (error) {
                    console.error(error);
                    messagesDiv.innerHTML = '<div class="empty-state-modern">حدث خطأ</div>';
                    return;
                }

                if (messages && messages.length > 0) {
                    const messageIds = messages.map(m => m.id);
                    const { data: reactions } = await sb
                        .from('message_reactions')
                        .select('*')
                        .in('message_id', messageIds);

                    if (reactions) {
                        messageReactions = {};
                        reactions.forEach(r => {
                            if (!messageReactions[r.message_id]) messageReactions[r.message_id] = {};
                            if (!messageReactions[r.message_id][r.reaction]) messageReactions[r.message_id][r.reaction] = { count: 0, userReacted: false };
                            messageReactions[r.message_id][r.reaction].count++;
                            if (r.user_id === currentUser.id) messageReactions[r.message_id][r.reaction].userReacted = true;
                        });
                    }
                }

                if (!messages || messages.length === 0) messagesDiv.innerHTML = '<div class="empty-state-modern"><i class="fa-regular fa-comment-dots"></i><h3>لا توجد رسائل</h3></div>';
                else displayMessages(messages);
                subscribeToMessages();
                subscribeToReactions();
                subscribeToTyping();
            }

            function displayMessages(messages) {
                const messagesDiv = document.getElementById('chat-messages');
                messagesDiv.innerHTML = '';
                messages.forEach(msg => {
                    addMessageToChat(msg, false);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function addMessageToChat(msg, isOptimistic = false) {
                if (messageIdsSet.has(msg.id)) {
                    return;
                }

                messageIdsSet.add(msg.id);

                const messagesDiv = document.getElementById('chat-messages');
                const messageClass = msg.sender_id === currentUser.id ? 'sent' : 'received';
                const time = new Date(msg.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                const messageWrapper = document.createElement('div');
                messageWrapper.className = `message-wrapper-modern ${messageClass}`;
                messageWrapper.dataset.messageId = msg.id;

                const messageElement = document.createElement('div');
                messageElement.className = `message-bubble ${messageClass}`;
                let contentHtml = `<div>${msg.content}</div>`;
                if (msg.media_url) {
                    if (msg.media_type === 'image') contentHtml += `<img src="${msg.media_url}" style="max-width:100%; border-radius:16px; margin-top:8px;">`;
                    else if (msg.media_type === 'video') contentHtml += `<video controls style="max-width:100%; border-radius:16px; margin-top:8px;"><source src="${msg.media_url}"></video>`;
                }
                messageElement.innerHTML = contentHtml + `<div class="message-time-modern">${time}</div>`;
                messageWrapper.appendChild(messageElement);

                const reactionsStrip = document.createElement('div');
                reactionsStrip.className = 'reactions-strip';
                reactionsStrip.id = `reactions-${msg.id}`;

                if (messageReactions[msg.id]) {
                    Object.entries(messageReactions[msg.id]).forEach(([emoji, data]) => {
                        const badge = document.createElement('span');
                        badge.className = 'reaction-badge';
                        badge.onclick = () => toggleReaction(msg.id, emoji);
                        badge.innerHTML = `${emoji} <span class="reaction-count">${data.count}</span>`;
                        reactionsStrip.appendChild(badge);
                    });
                }

                const pickerWrapper = document.createElement('div');
                pickerWrapper.style.display = 'flex';
                pickerWrapper.style.alignItems = 'center';

                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'reaction-toggle-modern';
                toggleBtn.innerHTML = '<i class="fa-regular fa-face-smile"></i>';
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    const existingPicker = pickerWrapper.querySelector('.reaction-picker-modern');
                    if (existingPicker) {
                        existingPicker.remove();
                    } else {
                        const picker = document.createElement('div');
                        picker.className = 'reaction-picker-modern';
                        EMOJIS.forEach(emoji => {
                            const btn = document.createElement('button');
                            btn.textContent = emoji;
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                toggleReaction(msg.id, emoji);
                                picker.remove();
                            };
                            picker.appendChild(btn);
                        });
                        pickerWrapper.appendChild(picker);
                    }
                };

                pickerWrapper.appendChild(toggleBtn);
                reactionsStrip.appendChild(pickerWrapper);
                messageWrapper.appendChild(reactionsStrip);

                messageElement.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    showMessageActions(e, msg.id, msg.sender_id === currentUser.id);
                });

                messagesDiv.appendChild(messageWrapper);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function showMessageActions(event, messageId, isMyMessage) {
                const existingPopup = document.querySelector('.message-actions-popup');
                if (existingPopup) existingPopup.remove();

                const popup = document.createElement('div');
                popup.className = 'message-actions-popup';
                EMOJIS.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.textContent = emoji;
                    btn.onclick = () => {
                        toggleReaction(messageId, emoji);
                        popup.remove();
                    };
                    popup.appendChild(btn);
                });
                if (isMyMessage) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                    deleteBtn.className = 'delete-action';
                    deleteBtn.onclick = () => {
                        deleteMessage(messageId);
                        popup.remove();
                    };
                    popup.appendChild(deleteBtn);
                }
                popup.style.left = event.pageX + 'px';
                popup.style.top = (event.pageY - 50) + 'px';
                document.body.appendChild(popup);

                const hidePopup = (e) => {
                    if (!popup.contains(e.target)) {
                        popup.remove();
                        document.removeEventListener('click', hidePopup);
                    }
                };
                setTimeout(() => document.addEventListener('click', hidePopup), 100);
            }

            async function deleteMessage(messageId) {
                if (!confirm('هل تريد حذف هذه الرسالة؟')) return;
                await sb.from('messages').delete().eq('id', messageId);
                const msgWrapper = document.querySelector(`.message-wrapper-modern[data-message-id="${messageId}"]`);
                if (msgWrapper) msgWrapper.remove();
                messageIdsSet.delete(messageId);
            }

            async function toggleReaction(messageId, emoji) {
                if (!currentUser) return alert('يجب تسجيل الدخول أولاً');

                const { data: existing } = await sb
                    .from('message_reactions')
                    .select('id')
                    .eq('message_id', messageId)
                    .eq('user_id', currentUser.id)
                    .eq('reaction', emoji)
                    .maybeSingle();

                if (existing) {
                    await sb.from('message_reactions').delete().eq('id', existing.id);
                } else {
                    await sb.from('message_reactions').insert([{
                        message_id: messageId,
                        user_id: currentUser.id,
                        reaction: emoji,
                        created_at: new Date()
                    }]);
                }
            }

            function subscribeToMessages() {
                if (messagesSubscription) messagesSubscription.unsubscribe();
                if (!currentChatUser || !currentUser) return;

                messagesSubscription = sb
                    .channel('chat-room')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages'
                    }, (payload) => {
                        const newMsg = payload.new;
                        const isRelated = 
                            (newMsg.sender_id === currentUser.id && newMsg.receiver_id === currentChatUser.id) ||
                            (newMsg.sender_id === currentChatUser.id && newMsg.receiver_id === currentUser.id);

                        if (isRelated) {
                            addMessageToChat(newMsg, false);
                            loadConversations();
                        }
                    })
                    .subscribe();
            }

            function subscribeToReactions() {
                if (reactionsSubscription) reactionsSubscription.unsubscribe();
                reactionsSubscription = sb
                    .channel('reactions-channel')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'message_reactions'
                    }, async (payload) => {
                        const messageId = payload.new?.message_id || payload.old?.message_id;
                        if (!messageId) return;

                        const { data: reactions } = await sb
                            .from('message_reactions')
                            .select('*')
                            .eq('message_id', messageId);

                        messageReactions[messageId] = {};
                        if (reactions) {
                            reactions.forEach(r => {
                                if (!messageReactions[messageId][r.reaction]) messageReactions[messageId][r.reaction] = { count: 0, userReacted: false };
                                messageReactions[messageId][r.reaction].count++;
                                if (r.user_id === currentUser.id) messageReactions[messageId][r.reaction].userReacted = true;
                            });
                        }

                        updateReactionsUI(messageId);
                    })
                    .subscribe();
            }

            function updateReactionsUI(messageId) {
                const reactionsStrip = document.getElementById(`reactions-${messageId}`);
                if (!reactionsStrip) return;

                reactionsStrip.innerHTML = '';
                if (messageReactions[messageId]) {
                    Object.entries(messageReactions[messageId]).forEach(([emoji, data]) => {
                        const badge = document.createElement('span');
                        badge.className = 'reaction-badge';
                        badge.onclick = () => toggleReaction(messageId, emoji);
                        badge.innerHTML = `${emoji} <span class="reaction-count">${data.count}</span>`;
                        reactionsStrip.appendChild(badge);
                    });
                }

                const pickerWrapper = document.createElement('div');
                pickerWrapper.style.display = 'flex';
                pickerWrapper.style.alignItems = 'center';

                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'reaction-toggle-modern';
                toggleBtn.innerHTML = '<i class="fa-regular fa-face-smile"></i>';
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    const existingPicker = pickerWrapper.querySelector('.reaction-picker-modern');
                    if (existingPicker) {
                        existingPicker.remove();
                    } else {
                        const picker = document.createElement('div');
                        picker.className = 'reaction-picker-modern';
                        EMOJIS.forEach(emoji => {
                            const btn = document.createElement('button');
                            btn.textContent = emoji;
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                toggleReaction(messageId, emoji);
                                picker.remove();
                            };
                            picker.appendChild(btn);
                        });
                        pickerWrapper.appendChild(picker);
                    }
                };

                pickerWrapper.appendChild(toggleBtn);
                reactionsStrip.appendChild(pickerWrapper);
            }

            function subscribeToTyping() {
                if (typingSubscription) typingSubscription.unsubscribe();
                if (!currentChatUser) return;

                typingSubscription = sb
                    .channel('typing-channel')
                    .on('broadcast', { event: 'typing' }, (payload) => {
                        if (payload.payload.sender_id === currentChatUser.id && payload.payload.receiver_id === currentUser.id) {
                            showTypingIndicatorBottom();
                        }
                    })
                    .subscribe();
            }

            function showTypingIndicatorBottom() {
                const indicator = document.getElementById('typing-indicator-bottom');
                indicator.classList.add('show');
                if (window.typingTimeout) clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => {
                    indicator.classList.remove('show');
                }, 2000);
            }

            window.handleTyping = function() {
                if (!currentUser || !currentChatUser) return;
                sb.channel('typing-channel').send({
                    type: 'broadcast',
                    event: 'typing',
                    payload: { sender_id: currentUser.id, receiver_id: currentChatUser.id }
                });
            };

            window.attachFile = function() { document.getElementById('chat-file-input').click(); };

            async function uploadChatFile(file) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                const filePath = `chat/${fileName}`;
                const { error } = await sb.storage.from('chat_attachments').upload(filePath, file);
                if (error) { console.error(error); return null; }
                const { data: publicUrlData } = sb.storage.from('chat_attachments').getPublicUrl(filePath);
                return publicUrlData.publicUrl;
            }

            window.closeChat = function() {
                if (messagesSubscription) messagesSubscription.unsubscribe();
                if (reactionsSubscription) reactionsSubscription.unsubscribe();
                if (typingSubscription) typingSubscription.unsubscribe();
                currentChatUser = null;
                messageIdsSet.clear();
                go('main-screen');
            };

            // ===== دوال المتابعة =====
            async function loadFollowingIds() {
                if (!currentUser) return;
                const { data } = await sb.from('followers').select('following_id').eq('follower_id', currentUser.id);
                followingIds = new Set(data?.map(f => f.following_id) || []);
            }

            window.toggleFollow = async function(targetUserId, buttonElement) {
                if (!currentUser) return alert('يجب تسجيل الدخول أولاً');
                if (targetUserId === currentUser.id) return;
                const isFollowing = followingIds.has(targetUserId);
                if (isFollowing) {
                    await sb.from('followers').delete().eq('follower_id', currentUser.id).eq('following_id', targetUserId);
                    followingIds.delete(targetUserId);
                    // إخفاء الزر إذا كان في الريلز
                    if (buttonElement) {
                        buttonElement.classList.remove('following');
                        buttonElement.innerHTML = '<i class="fa-solid fa-plus"></i>';
                        buttonElement.classList.add('hidden');
                    }
                } else {
                    await sb.from('followers').insert([{ follower_id: currentUser.id, following_id: targetUserId }]);
                    followingIds.add(targetUserId);
                    if (buttonElement) {
                        buttonElement.classList.add('following');
                        buttonElement.innerHTML = '<i class="fa-solid fa-check"></i>';
                        buttonElement.classList.add('hidden');
                    }
                }
                // تحديث واجهات أخرى
                if (document.getElementById('profile-tab').classList.contains('active')) loadProfileData();
                if (document.getElementById('home-tab').classList.contains('active')) loadHomeFeed();
                if (document.getElementById('user-profile-screen').classList.contains('active') && viewedUserId === targetUserId) {
                    loadUserProfileScreen(targetUserId);
                }
            };

            // ===== دوال الملف الشخصي =====
            async function loadProfileData() {
                if (!currentUser) return;
                const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
                if (profile) {
                    document.getElementById('profile-fullname').innerText = profile.full_name || 'مستخدم';
                    document.getElementById('profile-username').innerText = '@' + (profile.username || 'user');
                    document.getElementById('profile-bio').innerText = profile.bio || '';
                    if (profile.website) {
                        document.getElementById('profile-website').style.display = 'flex';
                        document.getElementById('profile-website a').href = profile.website;
                        document.getElementById('profile-website a').innerText = profile.website.replace(/^https?:\/\//, '');
                    }
                    if (profile.is_verified) document.getElementById('profile-verified').style.display = 'inline-flex';
                    const avatarDiv = document.getElementById('profile-avatar');
                    if (profile.avatar_url) avatarDiv.innerHTML = `<img src="${profile.avatar_url}" alt="avatar">`;
                    else avatarDiv.innerHTML = '<i class="fa-solid fa-user"></i>';
                }
                const { count: postsCount } = await sb.from('reels').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
                document.getElementById('profile-posts-count').innerText = postsCount || 0;
                const { count: followersCount } = await sb.from('followers').select('*', { count: 'exact', head: true }).eq('following_id', currentUser.id);
                document.getElementById('profile-followers-count').innerText = followersCount || 0;
                const { count: followingCount } = await sb.from('followers').select('*', { count: 'exact', head: true }).eq('follower_id', currentUser.id);
                document.getElementById('profile-following-count').innerText = followingCount || 0;
                
                const { data: reels } = await sb.from('reels').select('id, video_url, caption').eq('user_id', currentUser.id).order('created_at', { ascending: false });
                const grid = document.getElementById('profile-posts-grid');
                if (!reels || reels.length === 0) { 
                    grid.innerHTML = '<div class="empty-state-modern" style="height:200px;">لا توجد منشورات بعد</div>'; 
                    return; 
                }
                
                let gridHtml = '';
                for (const reel of reels) {
                    const { count: viewsCount } = await sb.from('reel_views').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                    gridHtml += `
                    <div class="grid-post-modern" onclick="window.viewReel('${reel.id}')">
                        <video src="${reel.video_url}#t=0.1" preload="metadata" muted playsinline></video>
                        <div class="grid-post-overlay-modern">
                            <i class="fa-solid fa-play"></i>
                            <span>${viewsCount || 0}</span>
                            <i class="fa-regular fa-eye" style="margin-right: 2px;"></i>
                        </div>
                    </div>`;
                }
                grid.innerHTML = gridHtml;
            }

            window.viewReel = function(reelId) { 
                switchTab('reels-tab', document.querySelectorAll('.nav-item-modern')[2]); // الفهرس 2 لأن زر الريلز أصبح الثالث
            };

            // ===== دوال الصفحة الرئيسية (Home) والقصص =====
            async function loadHomeFeed() {
                if (!currentUser) return;
                const feedDiv = document.getElementById('home-feed');
                
                // عرض Skeleton أثناء التحميل
                feedDiv.innerHTML = Array(3).fill(0).map(() => `
                    <div class="skeleton-card">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-line"></div>
                        </div>
                        <div class="skeleton-media"></div>
                        <div class="skeleton-actions">
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                        </div>
                    </div>
                `).join('');

                const following = Array.from(followingIds);

                    feedDiv.innerHTML = '<div class="empty-state-modern"><i class="fa-regular fa-smile"></i><h3>تابع أشخاصًا لرؤية منشوراتهم</h3><p>استخدم البحث للعثور على أصدقاء جدد</p></div>';
                    return;
                }

                const { data: reels, error } = await sb
                    .from('reels')
                    .select(`id, user_id, video_url, caption, created_at, profiles:user_id ( full_name, username, avatar_url )`)
                    .in('user_id', following)
                    .order('created_at', { ascending: false });

                if (error || !reels || reels.length === 0) {
                    feedDiv.innerHTML = '<div class="empty-state-modern"><i class="fa-regular fa-film"></i><h3>لا توجد منشورات بعد</h3><p>المستخدمون الذين تتابعهم لم ينشروا أي شيء</p></div>';
                    return;
                }

                const reelsWithStats = await Promise.all(reels.map(async (reel) => {
                    const { count: likesCount } = await sb.from('reel_likes').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                    const { count: commentsCount } = await sb.from('reel_comments').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                    const { data: likeData } = await sb.from('reel_likes').select('id').eq('reel_id', reel.id).eq('user_id', currentUser.id).maybeSingle();
                    const likedByMe = !!likeData;
                    return { ...reel, likesCount: likesCount || 0, commentsCount: commentsCount || 0, likedByMe };

                let html = '';
                reelsWithStats.forEach(reel => {

                    html += `
                        <div class="post-card" data-reel-id="${reel.id}" data-owner-id="${reel.user_id}">
                            <div class="post-header">
                                <div class="post-user" onclick="window.openUserProfileScreen('${reel.user_id}')">
                                    <div class="post-avatar">${avatarHtml}</div>
                                    <div>
                                        <div class="post-name">${user?.full_name || 'مستخدم'}</div>
                                        <div class="post-username">@${user?.username || 'user'}</div>
                                    </div>
                                </div>
                                <div class="post-options" onclick="window.showPostOptions('${reel.id}')">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </div>
                            </div>
                            <div class="post-media">
                                <video src="${reel.video_url}" loop playsinline preload="metadata"></video>
                                <div class="video-progress-bar">
                                    <div class="progress-fill"></div>
                                </div>
                                <div class="video-controls">
                                    <button class="play-pause"><i class="fa-solid fa-play"></i></button>
                                    <button class="mute"><i class="fa-solid fa-volume-high"></i></button>
                                    <button class="fullscreen"><i class="fa-solid fa-expand"></i></button>
                                    <span class="time-display">00:00 / 00:00</span>
                                </div>
                            </div>
                            <div class="post-actions">
                                <div class="post-action ${reel.likedByMe ? 'liked' : ''}" onclick="window.toggleLikeHome('${reel.id}')">
                                    <i class="fa-solid fa-heart"></i>
                                    <span id="home-likes-${reel.id}">${reel.likesCount}</span>
                                </div>
                                <div class="post-action" onclick="window.openCommentsSheet('${reel.id}', '${reel.user_id}')">
                                    <i class="fa-solid fa-comment"></i>
                                    <span id="home-comments-${reel.id}">${reel.commentsCount}</span>
                                </div>
                                <div class="post-action" onclick="window.shareReel('${reel.id}', '${reel.video_url}')">
                                    <i class="fa-solid fa-share"></i>
                                </div>
                            </div>
                            <div class="post-caption">
                                <strong>${user?.username || 'user'}</strong> ${captionHtml}
                            </div>
                            <div class="post-comments-preview" onclick="window.openCommentsSheet('${reel.id}', '${reel.user_id}')">
                                عرض كل ${reel.commentsCount} تعليق
                            </div>
                            <div class="post-time">
                                ${timeAgo(reel.created_at)}
                            </div>
                        </div>
                    `;
                });

                feedDiv.innerHTML = html;

                // إعداد تحكمات الفيديو لكل بطاقة
                document.querySelectorAll('.post-card').forEach(card => {

            // ===== إعداد تحكمات الفيديو المتطورة =====
            function setupVideoControls(card) {
                const video = card.querySelector('video');
                const playPauseBtn = card.querySelector('.play-pause');
                const muteBtn = card.querySelector('.mute');
                const fullscreenBtn = card.querySelector('.fullscreen');
                const progressBar = card.querySelector('.video-progress-bar');
                const progressFill = card.querySelector('.progress-fill');
                const timeDisplay = card.querySelector('.time-display');
                const mediaContainer = card.querySelector('.post-media');

                if (!video) return;

                // تحديث الوقت والتقدم
                video.addEventListener('timeupdate', () => {
                    if (video.duration) {
                        const percent = (video.currentTime / video.duration) * 100;
                        progressFill.style.width = percent + '%';
                        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                    }
                });

                video.addEventListener('loadedmetadata', () => {
                    timeDisplay.textContent = `00:00 / ${formatTime(video.duration)}`;
                });

                // زر تشغيل/إيقاف
                playPauseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (video.paused) {
                        video.play();
                        playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                    } else {
                        video.pause();
                        playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                    }
                });

                // زر كتم الصوت
                muteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    video.muted = !video.muted;
                    muteBtn.innerHTML = video.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
                });

                // زر ملء الشاشة
                fullscreenBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (video.requestFullscreen) {
                        video.requestFullscreen();
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    } else if (video.msRequestFullscreen) {
                        video.msRequestFullscreen();
                    }
                });

                // شريط التقدم: النقر للتنقل
                progressBar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rect = progressBar.getBoundingClientRect();
                    const pos = (e.clientX - rect.left) / rect.width;
                    if (video.duration) {
                        video.currentTime = pos * video.duration;
                    }
                });

                // إظهار/إخفاء التحكمات عند التفاعل مع الحاوية
                let controlsTimeout;
                mediaContainer.addEventListener('mousemove', () => {
                    mediaContainer.classList.add('video-controls-visible');
                    clearTimeout(controlsTimeout);
                    controlsTimeout = setTimeout(() => {
                        mediaContainer.classList.remove('video-controls-visible');
                    }, 3000);
                });

                mediaContainer.addEventListener('mouseleave', () => {
                    clearTimeout(controlsTimeout);
                    mediaContainer.classList.remove('video-controls-visible');
                });

                // تحديث زر التشغيل عند تغيير الحالة
                video.addEventListener('play', () => {
                    playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                });
                video.addEventListener('pause', () => {
                    playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                });
            }

            // ===== IntersectionObserver للتشغيل التلقائي =====
            function setupHomeFeedObserver() {
                if (homeFeedObserver) homeFeedObserver.disconnect();

                homeFeedObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const card = entry.target;
                        const video = card.querySelector('video');
                        if (!video) return;

                        if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
                            if (currentPlayingVideo && currentPlayingVideo !== video) {
                                currentPlayingVideo.pause();
                                currentPlayingVideo.muted = true;
                                const prevCard = currentPlayingVideo.closest('.post-card');
                                if (prevCard) {
                                    const prevPlayBtn = prevCard.querySelector('.play-pause');
                                    if (prevPlayBtn) prevPlayBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                                }
                            }
                            video.play().catch(() => {});
                            video.muted = false;
                            currentPlayingVideo = video;
                            const playBtn = card.querySelector('.play-pause');
                            if (playBtn) playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                        } else {
                            if (currentPlayingVideo === video) {
                                video.pause();
                                video.muted = true;
                                currentPlayingVideo = null;
                                const playBtn = card.querySelector('.play-pause');
                                if (playBtn) playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                            }
                        }
                    });
                }, { threshold: [0.6] });

                document.querySelectorAll('.post-card').forEach(card => {
                    homeFeedObserver.observe(card);
                });
            }

            // ===== دوال الريلز (تم إصلاحها) =====
            async function loadReels(reset = true) {
                if (!currentUser) return;
                const reelsDiv = document.getElementById('reels-list');
                const loading = document.getElementById('reels-loading');
                const empty = document.getElementById('reels-empty-state');

                if (reset) {
                    reelsPage = 0;
                    allReels = [];
                    hasMoreReels = true;
                    loading.style.display = 'flex';
                    empty.style.display = 'none';
                    reelsDiv.innerHTML = '';
                    reelsDiv.appendChild(loading);
                }

                if (!hasMoreReels) {
                    loading.style.display = 'none';
                    return;
                }

                isLoadingMoreReels = true;

                try {
                    const { data, error } = await sb
                        .from('reels')
                        .select(`
                            *,
                            profiles:user_id ( full_name, username, avatar_url ),
                            likes:reel_likes ( count ),
                            comments:reel_comments ( count )
                        `)
                        .order('created_at', { ascending: false })
                        .range(reelsPage * REELS_PER_PAGE, (reelsPage + 1) * REELS_PER_PAGE - 1);

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        hasMoreReels = false;
                        if (reset && allReels.length === 0) {
                            empty.style.display = 'flex';
                        }
                        loading.style.display = 'none';
                        return;
                    }

                    const reelsWithStats = await Promise.all(data.map(async (reel) => {
                        const { count: likesCount } = await sb.from('reel_likes').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                        const { count: commentsCount } = await sb.from('reel_comments').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                        const { data: likeData } = await sb.from('reel_likes').select('id').eq('reel_id', reel.id).eq('user_id', currentUser.id).maybeSingle();
                        const likedByMe = !!likeData;
                        return { ...reel, likesCount: likesCount || 0, commentsCount: commentsCount || 0, likedByMe };
                    }));

                    allReels = reset ? reelsWithStats : [...allReels, ...reelsWithStats];
                    reelsPage++;

                    renderReels();
                    loading.style.display = 'none';
                    if (allReels.length > 0) empty.style.display = 'none';
                } catch (error) {
                    console.error('خطأ في تحميل الريلز:', error);
                    loading.style.display = 'none';
                    empty.style.display = 'flex';
                } finally {
                    isLoadingMoreReels = false;
                }
            }

            function setupReelsObserver() {
                if (reelsObserver) reelsObserver.disconnect();

                reelsObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const reelCard = entry.target;
                            const index = parseInt(reelCard.dataset.index);
                            if (index === allReels.length - 1 && !isLoadingMoreReels && hasMoreReels) {
                                loadReels(false);
                            }

                            // تشغيل الفيديو
                            const video = reelCard.querySelector('video');
                            if (video && video.paused) {
                                video.play().catch(() => {});
                            }

                            // تسجيل مشاهدة
                            const reelId = reelCard.dataset.reelId;
                            markAsViewed(reelId);
                        } else {
                            const video = entry.target.querySelector('video');
                            if (video && !video.paused) {
                                video.pause();
                            }
                        }
                    });
                }, { threshold: 0.7 });

                document.querySelectorAll('.reel-card-modern').forEach(card => {
                    reelsObserver.observe(card);
                });
            }

                        div.innerHTML = `<div class="avatar-modern" style="width:45px; height:45px;">${user.avatar_url ? `<img src="${user.avatar_url}">` : '<i class="fa-solid fa-user"></i>'}</div><div class="item-info"><h4>${user.full_name}</h4><p>@${user.username}</p></div>`;
                        listDiv.appendChild(div);
                    });
                }
                document.getElementById('share-modal').classList.add('active');
            };

            async function sendReelToUser(userId, userName) {
                const message = `شاهد هذا الريل: ${currentShareReelUrl}`;
                await sb.from('messages').insert([{ sender_id: currentUser.id, receiver_id: userId, content: message, created_at: new Date() }]);
                alert(`تم إرسال الرابط إلى ${userName}`);
                closeShareModal();
            }

            window.copyReelLink = function() {
                if (!currentShareReelUrl) return;
                const shareText = `شاهد هذا الفيديو على تطبيق Loop 💜 فضاءك البنفسجي:\n${currentShareReelUrl}`;
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('✅ تم نسخ الرابط مع اسم التطبيق بنجاح!');
                    closeShareModal();
                }).catch(err => {
                    console.error('فشل النسخ:', err);
                    alert('❌ حدث خطأ أثناء النسخ');
                });
            };

            window.closeShareModal = function() { 
                document.getElementById('share-modal').classList.remove('active'); 
            };

            // ===== دوال تعديل الملف الشخصي =====
            window.openEditProfile = async function() {
                if (!currentUser) return;
                const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
                document.getElementById('edit-fullname').value = profile?.full_name || currentUser.user_metadata?.full_name || '';
                document.getElementById('edit-username').value = profile?.username || currentUser.user_metadata?.username || '';
                document.getElementById('edit-bio').value = profile?.bio || '';
                document.getElementById('edit-website').value = profile?.website || '';
                document.getElementById('edit-email').value = currentUser.email;
                document.getElementById('edit-password').value = '';
                document.getElementById('edit-password-confirm').value = '';
                const avatarPreview = document.getElementById('avatar-preview');
                if (profile?.avatar_url) avatarPreview.innerHTML = `<img src="${profile.avatar_url}" alt="avatar">`;
                else avatarPreview.innerHTML = '<i class="fa-solid fa-user"></i>';
                usernameAvailable = true;
                document.getElementById('username-status').innerHTML = '';
                go('edit-profile-screen');
            };

            window.checkUsernameAuto = async function() {
                const username = document.getElementById('edit-username').value.trim();
                const statusDiv = document.getElementById('username-status');
                if (!username) {
                    statusDiv.innerHTML = '';
                    usernameAvailable = false;
                    return;
                }
                statusDiv.innerHTML = 'جاري التحقق...';
                statusDiv.className = 'username-check-result';
                const { data, error } = await sb.from('profiles').select('username').eq('username', username).neq('id', currentUser.id).maybeSingle();
                if (error) {
                    statusDiv.innerHTML = 'حدث خطأ';
                    statusDiv.className = 'username-check-result unavailable';
                    usernameAvailable = false;
                } else if (data) {
                    statusDiv.innerHTML = 'اسم المستخدم غير متاح';
                    statusDiv.className = 'username-check-result unavailable';
                    usernameAvailable = false;
                } else {
                    statusDiv.innerHTML = 'اسم المستخدم متاح ✓';
                    statusDiv.className = 'username-check-result available';
                    usernameAvailable = true;
                }
            };

            async function uploadAvatar(file) {
                if (!file) return null;
                const fileExt = file.name.split('.').pop();
                const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                const filePath = `avatars/${fileName}`;
                const { error } = await sb.storage.from('avatars').upload(filePath, file);
                if (error) { console.error(error); return null; }
                const { data: publicUrlData } = sb.storage.from('avatars').getPublicUrl(filePath);
                return publicUrlData.publicUrl;
            }

            window.removeAvatar = function() {
                document.getElementById('avatar-preview').innerHTML = '<i class="fa-solid fa-user"></i>';
                document.getElementById('avatar-input').value = '';
            };

            window.saveProfile = async function() {
                const fullname = document.getElementById('edit-fullname').value.trim();
                const username = document.getElementById('edit-username').value.trim();
                const bio = document.getElementById('edit-bio').value.trim();
                const website = document.getElementById('edit-website').value.trim();
                const email = document.getElementById('edit-email').value.trim();
                const password = document.getElementById('edit-password').value;
                const passwordConfirm = document.getElementById('edit-password-confirm').value;
                const avatarFile = document.getElementById('avatar-input').files[0];
                if (!fullname || !username || !email) return alert('الرجاء ملء جميع الحقول الإجبارية');
                if (!email.includes('@')) return alert('البريد الإلكتروني غير صالح');
                if (password && password.length < 6) return alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                if (password !== passwordConfirm) return alert('كلمة المرور غير متطابقة');

                if (!usernameAvailable && username !== currentUser.user_metadata?.username) {
                    return alert('اسم المستخدم غير متاح، الرجاء اختيار اسم آخر');
                }

                const btn = document.getElementById('save-profile-btn');
                btn.disabled = true; btn.innerText = 'جاري الحفظ...';
                try {
                    let avatarUrl = null;
                    if (avatarFile) avatarUrl = await uploadAvatar(avatarFile);

                    const updates = {};
                    if (email !== currentUser.email) updates.email = email;
                    if (password) updates.password = password;
                    updates.data = { full_name: fullname, username: username };

                    if (Object.keys(updates).length > 0) {
                        const { error: authError } = await sb.auth.updateUser(updates);
                        if (authError) throw new Error(authError.message);
                    }

                    const profileUpdates = { full_name: fullname, username: username, bio: bio, website: website, updated_at: new Date() };
                    if (avatarUrl) profileUpdates.avatar_url = avatarUrl;

                    const { error: profileError } = await sb.from('profiles').update(profileUpdates).eq('id', currentUser.id);
                    if (profileError) throw new Error(profileError.message);

                    const { data: { user } } = await sb.auth.getUser();
                    currentUser = user;
                    updateUI(currentUser);
                    alert('تم حفظ التغييرات بنجاح');
                    goBackToProfile();
                } catch (err) { alert('حدث خطأ: ' + err.message); }
                finally { btn.disabled = false; btn.innerText = 'حفظ التغييرات'; }
            };

            // ===== دوال الملف الشخصي للمستخدم الآخر =====
            window.openUserProfileScreen = async function(userId) {
                viewedUserId = userId;
                await loadUserProfileScreen(userId);
                go('user-profile-screen');
            };

            async function loadUserProfileScreen(userId) {
                if (!userId) return;
                const { data: profile } = await sb.from('profiles').select('*').eq('id', userId).single();
                if (!profile) return;

                document.getElementById('user-profile-fullname').innerText = profile.full_name || 'مستخدم';
                document.getElementById('user-profile-username').innerText = '@' + (profile.username || 'user');
                document.getElementById('user-profile-bio').innerText = profile.bio || '';
                if (profile.website) {
                    document.getElementById('user-profile-website').style.display = 'flex';
                    document.getElementById('user-profile-website a').href = profile.website;
                    document.getElementById('user-profile-website a').innerText = profile.website.replace(/^https?:\/\//, '');
                } else {
                    document.getElementById('user-profile-website').style.display = 'none';
                }
                if (profile.is_verified) {
                    document.getElementById('user-profile-verified').style.display = 'inline-flex';
                } else {
                    document.getElementById('user-profile-verified').style.display = 'none';
                }
                const avatarDiv = document.getElementById('user-profile-avatar');
                if (profile.avatar_url) avatarDiv.innerHTML = `<img src="${profile.avatar_url}" alt="avatar">`;
                else avatarDiv.innerHTML = '<i class="fa-solid fa-user"></i>';

                const { count: postsCount } = await sb.from('reels').select('*', { count: 'exact', head: true }).eq('user_id', userId);
                document.getElementById('user-posts-count').innerText = postsCount || 0;
                const { count: followersCount } = await sb.from('followers').select('*', { count: 'exact', head: true }).eq('following_id', userId);
                document.getElementById('user-followers-count').innerText = followersCount || 0;
                const { count: followingCount } = await sb.from('followers').select('*', { count: 'exact', head: true }).eq('follower_id', userId);
                document.getElementById('user-following-count').innerText = followingCount || 0;

                const followBtn = document.getElementById('user-profile-follow-btn');
                if (userId === currentUser.id) {
                    followBtn.style.display = 'none';
                } else {
                    followBtn.style.display = 'block';
                    const isFollowing = followingIds.has(userId);
                    followBtn.innerText = isFollowing ? 'متابَع' : 'متابعة';
                    followBtn.classList.toggle('following', isFollowing);
                    if (isFollowing) {
                        followBtn.classList.add('hidden');
                    } else {
                        followBtn.classList.remove('hidden');
                    }
                }

                const { data: reels } = await sb.from('reels').select('id, video_url, caption').eq('user_id', userId).order('created_at', { ascending: false });
                const grid = document.getElementById('user-posts-grid');
                if (!reels || reels.length === 0) { 
                    grid.innerHTML = '<div class="empty-state-modern" style="height:200px;">لا توجد منشورات</div>'; 
                    return; 
                }
                let gridHtml = '';
                for (const reel of reels) {
                    const { count: viewsCount } = await sb.from('reel_views').select('*', { count: 'exact', head: true }).eq('reel_id', reel.id);
                    gridHtml += `
                        <div class="user-grid-post" onclick="window.viewReel('${reel.id}')">
                            <video src="${reel.video_url}#t=0.1" preload="metadata" muted playsinline></video>
                            <div class="user-grid-overlay">
                                <i class="fa-solid fa-play"></i> ${viewsCount || 0}
                            </div>
                        </div>`;
                }
                grid.innerHTML = gridHtml;
            }

            window.toggleFollowFromUserProfile = async function() {
                if (!viewedUserId) return;
                const followBtn = document.getElementById('user-profile-follow-btn');
                await toggleFollow(viewedUserId, followBtn);
                loadUserProfileScreen(viewedUserId);
            };

            window.messageUserFromProfile = function() {
                if (!viewedUserId) return;
                sb.from('profiles').select('*').eq('id', viewedUserId).single().then(({ data }) => {
                    if (data) {
                        openChat(data.id, data.full_name, data.username, data.avatar_url);
                    }
                });
            };

            window.goBackFromUserProfile = function() {
                go('main-screen');
            };

            // ===== دوال القائمة والإعدادات =====
            window.openSettingsMenu = function() { 
                document.getElementById('settings-menu').classList.add('open'); 
                document.getElementById('settings-overlay').classList.add('active'); 
            };
            window.closeSettingsMenu = function() { 
                document.getElementById('settings-menu').classList.remove('open'); 
                document.getElementById('settings-overlay').classList.remove('active'); 
            };
            window.openPrivacyPolicy = function() { 
                document.getElementById('privacy-modal').classList.add('active'); 
                closeSettingsMenu(); 
            };
            window.closePrivacyPolicy = function() { 
                document.getElementById('privacy-modal').classList.remove('active'); 
            };

            window.openChatUserOptions = function() {
                if (!currentChatUser) return;
                document.getElementById('chat-options-modal').classList.add('active');
            };

            window.closeChatOptionsModal = function() {
                document.getElementById('chat-options-modal').classList.remove('active');
            };

            window.viewChatUserProfile = async function() {
                closeChatOptionsModal();
                if (!currentChatUser) return;
                openUserProfileScreen(currentChatUser.id);
            };

            window.closeUserProfileModal = function() {
                document.getElementById('user-profile-modal').classList.remove('active');
            };

            window.toggleFollowFromModal = async function() {
                if (!currentChatUser || currentChatUser.id === currentUser.id) return;
                const isFollowing = followingIds.has(currentChatUser.id);
                if (isFollowing) {
                    await sb.from('followers').delete().eq('follower_id', currentUser.id).eq('following_id', currentChatUser.id);
                    followingIds.delete(currentChatUser.id);
                } else {
                    await sb.from('followers').insert([{ follower_id: currentUser.id, following_id: currentChatUser.id }]);
                    followingIds.add(currentChatUser.id);
                }
                const followBtn = document.getElementById('modal-follow-btn');
                followBtn.innerText = isFollowing ? 'متابعة' : 'متابَع';
                followBtn.classList.toggle('following', !isFollowing);
                const { count } = await sb.from('followers').select('*', { count: 'exact', head: true }).eq('following_id', currentChatUser.id);
                document.getElementById('modal-followers-count').innerText = count || 0;
            };

            window.messageUserFromModal = function() {
                closeUserProfileModal();
            };

            window.blockUser = async function() {
                if (!currentChatUser || currentChatUser.id === currentUser.id) return;
                if (!confirm(`هل أنت متأكد من حظر ${currentChatUser.fullName}؟`)) return;

                const { error } = await sb.from('blocks').insert([
                    { blocker_id: currentUser.id, blocked_id: currentChatUser.id, created_at: new Date() }
                ]);

                if (error) {
                    console.error(error);
                    alert('حدث خطأ أثناء الحظر');
                    return;
                }

                blockedUsers.add(currentChatUser.id);
                alert(`تم حظر ${currentChatUser.fullName}. لن يتمكن من مراسلتك.`);
                closeChatOptionsModal();
                closeChat();
            };

            async function loadBlockedUsers() {
                if (!currentUser) return;
                const { data } = await sb.from('blocks').select('blocked_id').eq('blocker_id', currentUser.id);
                if (data) {
                    blockedUsers = new Set(data.map(b => b.blocked_id));
                }
            }

            window.openBlockedUsersScreen = async function() {
                closeSettingsMenu();
                go('blocked-users-screen');
                await loadBlockedUsersList();
            };

            async function loadBlockedUsersList() {
                if (!currentUser) return;
                const listDiv = document.getElementById('blocked-users-list');
                const loading = document.getElementById('blocked-loading');
                const empty = document.getElementById('blocked-empty');
                loading.style.display = 'flex';
                empty.style.display = 'none';
                listDiv.innerHTML = '';
                listDiv.appendChild(loading);

                const { data: blocks, error } = await sb
                    .from('blocks')
                    .select(`blocked_id, profiles:blocked_id ( id, full_name, username, avatar_url )`)
                    .eq('blocker_id', currentUser.id);

                loading.style.display = 'none';
                if (error || !blocks || blocks.length === 0) {
                    empty.style.display = 'flex';
                    return;
                }

                let html = '';
                blocks.forEach(block => {
                    const user = block.profiles;
                    if (!user) return;
                    html += `
                        <div class="blocked-item">
                            <div class="avatar-modern" style="width:50px; height:50px;">${user.avatar_url ? `<img src="${user.avatar_url}">` : '<i class="fa-solid fa-user"></i>'}</div>
                            <div class="blocked-info">
                                <h4>${user.full_name}</h4>
                                <p>@${user.username}</p>
                            </div>
                            <button class="unblock-btn" onclick="window.unblockUser('${user.id}')">إلغاء الحظر</button>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
            }

            window.unblockUser = async function(blockedId) {
                if (!confirm('هل تريد إلغاء حظر هذا المستخدم؟')) return;
                const { error } = await sb.from('blocks').delete().eq('blocker_id', currentUser.id).eq('blocked_id', blockedId);
                if (error) {
                    alert('حدث خطأ');
                    return;
                }
                blockedUsers.delete(blockedId);
                loadBlockedUsersList();
            };

            function showConversationContextMenu(event, otherUserId, otherUserName) {
                const menu = document.getElementById('conversation-context-menu');
                menu.innerHTML = `<button class="delete-conv" onclick="window.deleteConversation('${otherUserId}', '${otherUserName}')">🗑️ حذف المحادثة مع ${otherUserName}</button>`;
                menu.style.display = 'block';
                menu.style.left = event.pageX + 'px';
                menu.style.top = event.pageY + 'px';

                const hideMenu = (e) => {
                    if (!menu.contains(e.target)) {
                        menu.style.display = 'none';
                        document.removeEventListener('click', hideMenu);
                    }
                };
                setTimeout(() => document.addEventListener('click', hideMenu), 100);
            }

            window.deleteConversation = async function(otherUserId, otherUserName) {
                if (!confirm(`هل أنت متأكد من حذف المحادثة مع ${otherUserName}؟`)) return;
                await sb.from('messages')
                    .delete()
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${currentUser.id})`);
                alert('تم حذف المحادثة');
                document.getElementById('conversation-context-menu').style.display = 'none';
                loadConversations();
            };

            function subscribeToAllIncomingMessages() {
                if (!currentUser) return;
                sb.channel('global-messages')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages',
                        filter: `receiver_id=eq.${currentUser.id}` 
                    }, (payload) => {
                        loadConversations(); 
                    })
                    .subscribe();
            }

            // ===== دوال رفع الريل مع شريط التقدم =====
            window.uploadReel = async function() {
                const file = document.getElementById('video-input').files[0];
                const caption = document.getElementById('reel-caption').value.trim();
                if (!file) return alert('الرجاء اختيار فيديو');
                if (!caption) return alert('الرجاء إضافة وصف للفيديو');

                const btn = document.getElementById('upload-reel-btn');
                const progressContainer = document.getElementById('upload-progress');
                const progressFill = document.getElementById('upload-progress-fill');
                const percentDiv = document.getElementById('upload-percent');

                btn.disabled = true;
                btn.innerText = 'جاري الرفع...';
                progressContainer.classList.add('active');
                percentDiv.classList.add('active');

                try {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;
                    const filePath = `reels/${fileName}`;

                    // رفع مع تتبع التقدم
                    const { error: uploadError } = await sb.storage.from('reels').upload(filePath, file, {
                        onUploadProgress: (progress) => {
                            const percent = (progress.loaded / progress.total) * 100;
                            progressFill.style.width = percent + '%';
                            percentDiv.innerText = Math.round(percent) + '%';
                        }
                    });

                    if (uploadError) throw new Error('فشل رفع الفيديو: ' + uploadError.message);

                    const { data: publicUrlData } = sb.storage.from('reels').getPublicUrl(filePath);
                    const videoUrl = publicUrlData.publicUrl;

                    const { error: insertError } = await sb.from('reels').insert([{
                        user_id: currentUser.id,
                        video_url: videoUrl,
                        caption: caption,
                        created_at: new Date()
                    }]);

                    if (insertError) throw new Error('فشل حفظ الريل: ' + insertError.message);

                    alert('✅ تم نشر الريل بنجاح');
                    go('main-screen');
                    loadReels(true); // تحديث الريلز
                    loadHomeFeed(); // تحديث الصفحة الرئيسية
                    loadProfileData(); // تحديث الملف الشخصي
                } catch (err) {
                    alert(err.message);
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'نشر الريل';
                    progressContainer.classList.remove('active');
                    percentDiv.classList.remove('active');
                    progressFill.style.width = '0%';
                    document.getElementById('video-input').value = '';
                    document.getElementById('reel-caption').value = '';
                    document.getElementById('video-preview').innerHTML = '<i class="fa-solid fa-video" style="font-size: 60px; color: var(--text-muted);"></i>';
                }
            };

            // ===== دوال البحث عن الهاشتاغ والإشارات =====
            window.searchByHashtag = function(tag) {
                switchTab('search-tab', document.querySelectorAll('.nav-item-modern')[3]); // البحث هو الرابع
                document.getElementById('search-input').value = '#' + tag;
                setSearchFilter('hashtags');
                performSearch();
            };

            window.searchByUsername = function(username) {
                switchTab('search-tab', document.querySelectorAll('.nav-item-modern')[3]); // البحث هو الرابع
                document.getElementById('search-input').value = '@' + username;
                setSearchFilter('users');
                performSearch();
            };

            // ===== التحميل الأولي =====
            window.onload = async () => {
                buildUI();

                // مستمعي الأحداث لمعاينة الملفات
                document.getElementById('video-input')?.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) { 
                            document.getElementById('video-preview').innerHTML = `<video src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;"></video>`; 
                        };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById('story-input')?.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            if (file.type.startsWith('image/')) {
                                document.getElementById('story-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                            } else {
                                document.getElementById('story-preview').innerHTML = `<video src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;"></video>`;
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById('avatar-input')?.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) { 
                        const reader = new FileReader(); 
                        reader.onload = function(ev) { 
                            document.getElementById('avatar-preview').innerHTML = `<img src="${ev.target.result}" alt="avatar">`; 
                        }; 
                        reader.readAsDataURL(file); 
                    }
                });
                document.getElementById('chat-file-input')?.addEventListener('change', function(e) {
                    if (e.target.files.length > 0) { 
                        selectedFile = e.target.files[0]; 
                        alert('تم اختيار الملف: ' + selectedFile.name + '. اضغط إرسال.'); 
                    }
                });

                // إغلاق المودالات عند النقر خارجها
                document.getElementById('share-modal')?.addEventListener('click', function(e) { if (e.target === this) closeShareModal(); });
                document.getElementById('privacy-modal')?.addEventListener('click', function(e) { if (e.target === this) closePrivacyPolicy(); });
                document.getElementById('chat-options-modal')?.addEventListener('click', function(e) { if (e.target === this) closeChatOptionsModal(); });
                document.getElementById('user-profile-modal')?.addEventListener('click', function(e) { if (e.target === this) closeUserProfileModal(); });
                document.getElementById('create-options-modal')?.addEventListener('click', function(e) { if (e.target === this) closeCreateOptions(); });

                // تسجيل Service Worker
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').catch(console.error);
                }

                const { data: { session } } = await sb.auth.getSession();
                if (session) { 
                    currentUser = session.user; 
                    updateUI(currentUser); 
                    go('main-screen'); 
                    loadConversations(); 
                    subscribeToAllIncomingMessages(); 
                }
            };
        })();
    </script>
</body>
</html>
